<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sean Moore · Portfolio</title>
    <meta name="description" content="Portfolio of Sean Moore, developer and founder of Edgeable." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="loader"><div class="loader-ring"></div></div>

    <header class="topbar">
      <button class="brand" data-scroll="top">
        <span class="brand-dot"></span>
        <span id="brand-name">Sean Moore</span>
      </button>
      <nav class="nav">
        <button data-scroll="about">About</button>
        <button data-scroll="work">Work</button>
        <button data-scroll="contact">Contact</button>
      </nav>
    </header>

    <main>
      <section id="hero" class="section" data-section="hero">
        <div class="wrap center">
          <p class="eyebrow">Portfolio</p>
          <h1 class="display" id="hero-name">Sean Moore</h1>
          <p class="lead" id="hero-tag">Developer &amp; founder of Edgeable</p>
        </div>
        <div class="scroll-cue">scroll<span>↓</span></div>
      </section>

      <section id="about" class="section" data-section="about">
        <div class="wrap right">
          <p class="eyebrow">About</p>
          <p class="big-text" id="about-text"></p>
        </div>
      </section>

      <section id="work" class="section" data-section="work">
        <div class="wrap left">
          <p class="eyebrow">Selected work</p>
          <ul class="projects" id="projects"></ul>
        </div>
      </section>

      <section id="contact" class="section" data-section="contact">
        <div class="wrap center">
          <p class="eyebrow">Get in touch</p>
          <h2 class="display sm">Let's build<br />something.</h2>
          <div class="contact-links" id="contact-links"></div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
